name: Refresh data
on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh legislators
        run: python3 scripts/refresh_legislators.py
      - name: Refresh town orgs
        run: python3 scripts/refresh_town_orgs.py
        continue-on-error: true
      - name: Commit
        run: |
          git config user.name "ma-power-map-bot"
          git config user.email "bot@allaire-matthew.github.io"
          if git diff --quiet public/data/; then
            echo "No changes."
            exit 0
          fi
          git add public/data/
          git commit -m "chore(data): refresh from upstream"
          git push
