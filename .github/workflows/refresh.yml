name: Refresh data
on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh legislators
        run: python3 scripts/refresh_legislators.py
      - name: Refresh town orgs
        run: python3 scripts/refresh_town_orgs.py
        continue-on-error: true
      - name: Refresh chapter pipeline
        run: python3 scripts/refresh_chapter_pipeline.py
        continue-on-error: true
      - name: Refresh next school committee meetings
        run: python3 scripts/refresh_school_meetings.py
        continue-on-error: true
      - name: Refresh town + statewide news
        run: python3 scripts/refresh_news.py
        continue-on-error: true
      - name: Install PDF tools (poppler + tesseract)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils tesseract-ocr
          pip install pymupdf
      - name: Refresh handbook policies (PDF extraction + OCR)
        run: python3 scripts/refresh_handbooks.py
        continue-on-error: true
        timeout-minutes: 30
      - name: Commit
        run: |
          git config user.name "ma-power-map-bot"
          git config user.email "bot@allaire-matthew.github.io"
          if git diff --quiet public/data/; then
            echo "No changes."
            exit 0
          fi
          git add public/data/
          git commit -m "chore(data): refresh from upstream"
          git push
